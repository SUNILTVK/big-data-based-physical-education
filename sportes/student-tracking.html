<!doctype html>
<html>
  <head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Student Performance Tracking - BD-PE A&O</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="navbar"><a class="brand" href="index.html">BD-PE A&O</a></header>
    <main style="padding:40px">
      <h1>Student Performance Tracking</h1>
      <p>Records activities, exercise scores, attendance and fitness performance. Animated cards and charts below.</p>
      <section style="margin-top:20px;display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start">
        <div class="glass" style="padding:18px">
          <h3>Recent Entries</h3>
          <ul><li>John Doe — 92 (Sprint)</li><li>Mary L — 88 (Jump)</li><li>Team B — 94 (Relay)</li></ul>
        </div>
        <div class="glass" style="padding:18px">
          <h3>Attendance</h3>
          <canvas id="chartStudent" width="300" height="160"></canvas>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      const ctx=document.getElementById('chartStudent'); if(ctx){ new Chart(ctx.getContext('2d'),{type:'bar',data:{labels:['Mon','Tue','Wed','Thu','Fri'],datasets:[{label:'Attendance %',data:[95,92,90,96,94],backgroundColor:'#00ff88'}]},options:{plugins:{legend:{display:false}}}})}
    </script>
  </body>
</html>
