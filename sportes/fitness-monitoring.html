<!doctype html>
<html>
  <head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Fitness Monitoring - BD-PE A&O</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="navbar"><a class="brand" href="index.html">BD-PE A&O</a></header>
    <main style="padding:40px">
      <h1>Fitness Monitoring</h1>
      <p>BMI tracking, heart rate, calories burned and stamina analysis with animated meters.</p>
      <div style="display:flex;gap:18px;margin-top:18px">
        <div class="glass" style="padding:14px;flex:1">
          <h3>BMI</h3>
          <div style="height:120px;background:linear-gradient(90deg,#002,#003);border-radius:8px"></div>
        </div>
        <div class="glass" style="padding:14px;width:320px">
          <h3>Heart Rate</h3>
          <div style="height:120px;background:linear-gradient(90deg,#200,#300);border-radius:8px"></div>
        </div>
      </div>
    </main>
  </body>
</html>
